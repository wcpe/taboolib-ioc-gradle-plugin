name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    env:
      EXAMPLE_LOCAL_MAVEN_REPO: ${{ github.workspace }}\example\.m2-local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build root project
        run: .\gradlew.bat --no-daemon build

      - name: Publish current plugin to isolated mavenLocal
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force $env:EXAMPLE_LOCAL_MAVEN_REPO -ErrorAction SilentlyContinue
          .\gradlew.bat --no-daemon publishToMavenLocal "-Dmaven.repo.local=$env:EXAMPLE_LOCAL_MAVEN_REPO"

      - name: Build Groovy DSL example
        shell: pwsh
        run: |
          .\gradlew.bat --no-daemon -p example :groovy-consumer:build "-Dmaven.repo.local=$env:EXAMPLE_LOCAL_MAVEN_REPO" --refresh-dependencies

      - name: Build Kotlin DSL example
        shell: pwsh
        run: |
          .\gradlew.bat --no-daemon -p example :kotlin-consumer:build "-Dmaven.repo.local=$env:EXAMPLE_LOCAL_MAVEN_REPO" --refresh-dependencies

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            build/reports/tests/test
            build/reports/jacoco/test
            example/groovy-consumer/build/libs
            example/groovy-consumer/build/reports/taboolib-ioc
            example/kotlin-consumer/build/libs
            example/kotlin-consumer/build/reports/taboolib-ioc
          if-no-files-found: warn
