name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXAMPLE_LOCAL_MAVEN_REPO: ${{ github.workspace }}/example/.m2-local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run all tests
        run: ./gradlew ciTest --no-daemon --stacktrace

      - name: Publish current plugin to isolated Maven local
        run: |
          rm -rf "$EXAMPLE_LOCAL_MAVEN_REPO"
          ./gradlew publishToMavenLocal --no-daemon -Dmaven.repo.local="$EXAMPLE_LOCAL_MAVEN_REPO"

      - name: Build Groovy DSL example
        run: ./gradlew -p example :groovy-consumer:build --no-daemon -Dmaven.repo.local="$EXAMPLE_LOCAL_MAVEN_REPO" --refresh-dependencies

      - name: Build Kotlin DSL example
        run: ./gradlew -p example :kotlin-consumer:build --no-daemon -Dmaven.repo.local="$EXAMPLE_LOCAL_MAVEN_REPO" --refresh-dependencies

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Test Results
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/**
            build/test-results/**
            plugin-integration-tests/build/reports/**
            plugin-integration-tests/build/test-results/**
            example/groovy-consumer/build/libs/**
            example/groovy-consumer/build/reports/taboolib-ioc/**
            example/kotlin-consumer/build/libs/**
            example/kotlin-consumer/build/reports/taboolib-ioc/**
          if-no-files-found: ignore
