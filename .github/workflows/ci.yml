name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build root project
        run: .\gradlew.bat build

      - name: Publish example ioc-lib to isolated mavenLocal
        shell: pwsh
        run: |
          $exampleLocalRepo = Join-Path (Resolve-Path "example").Path ".m2-local"
          .\gradlew.bat -p example :ioc-lib:publishToMavenLocal -Pexample.modules=ioc-lib "-Dmaven.repo.local=$exampleLocalRepo"

      - name: Build Groovy DSL example
        shell: pwsh
        run: |
          $exampleLocalRepo = Join-Path (Resolve-Path "example").Path ".m2-local"
          .\gradlew.bat -p example :groovy-consumer:build -Pexample.modules=groovy-consumer "-Dmaven.repo.local=$exampleLocalRepo" --refresh-dependencies

      - name: Build Kotlin DSL example
        shell: pwsh
        run: |
          $exampleLocalRepo = Join-Path (Resolve-Path "example").Path ".m2-local"
          .\gradlew.bat -p example :kotlin-consumer:build -Pexample.modules=kotlin-consumer "-Dmaven.repo.local=$exampleLocalRepo" --refresh-dependencies

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            build/reports/tests/test
            build/reports/jacoco/test
            example/groovy-consumer/build/libs
            example/groovy-consumer/build/reports/taboolib-ioc
            example/kotlin-consumer/build/libs
            example/kotlin-consumer/build/reports/taboolib-ioc
          if-no-files-found: warn
